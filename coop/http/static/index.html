<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>coop dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    background: #1a1a2e; color: #e0e0e0;
    font-family: 'Consolas', 'Monaco', monospace; font-size: 14px;
    padding: 20px;
}
h1 { color: #7fdbca; margin-bottom: 16px; font-size: 18px; }

/* Tabs */
.tabs {
    display: flex; gap: 2px; margin-bottom: 20px;
}
.tab {
    padding: 8px 20px; background: #16213e; border: none; color: #888;
    font-family: inherit; font-size: 13px; cursor: pointer;
    border-radius: 6px 6px 0 0; text-transform: uppercase; letter-spacing: 1px;
}
.tab.active { background: #0f3460; color: #7fdbca; }
.tab:hover { color: #c3cee3; }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Summary bar */
.summary {
    display: flex; gap: 24px; margin-bottom: 20px;
    padding: 12px; background: #16213e; border-radius: 6px;
    flex-wrap: wrap;
}
.stat { display: flex; flex-direction: column; }
.stat-label { color: #888; font-size: 11px; text-transform: uppercase; }
.stat-value { color: #7fdbca; font-size: 20px; font-weight: bold; }

/* Charts */
.chart-container {
    background: #16213e; border-radius: 6px; padding: 12px;
    margin-bottom: 20px;
}
.chart-title { color: #888; font-size: 11px; text-transform: uppercase; margin-bottom: 8px; }
canvas { display: block; width: 100%; }
.legend {
    display: flex; flex-wrap: wrap; gap: 12px;
    margin-top: 8px; font-size: 11px;
}
.legend-item { display: flex; align-items: center; gap: 4px; cursor: pointer; }
.legend-item.dimmed { opacity: 0.3; }
.legend-swatch { width: 10px; height: 10px; border-radius: 2px; }

/* Context tree */
.ctx {
    margin-left: 20px; padding: 6px 10px;
    border-left: 2px solid #333; margin-bottom: 4px;
}
.ctx-root { margin-left: 0; }
.ctx-header { display: flex; align-items: center; gap: 8px; }
.ctx-name { font-weight: bold; color: #c3cee3; }
.badge {
    font-size: 11px; padding: 1px 6px; border-radius: 3px;
    font-weight: bold; text-transform: uppercase;
}
.badge-running  { background: #264f3d; color: #7fdbca; }
.badge-yielded  { background: #3d3c1f; color: #e6db74; }
.badge-blocked  { background: #4f2626; color: #f07178; }
.badge-killed   { background: #4f2626; color: #ff5370; }
.ctx-stats { color: #666; font-size: 12px; margin-top: 2px; }
.error { color: #f07178; padding: 20px; }
#updated { color: #555; font-size: 11px; margin-top: 12px; }

/* Cooperator sections */
.coop-section {
    margin-bottom: 16px; padding: 12px; background: #0f3460;
    border-radius: 6px; border-left: 3px solid #7fdbca;
}
.coop-section.remote { border-left-color: #c792ea; }
.coop-header {
    display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.coop-name {
    font-weight: bold; color: #7fdbca; font-size: 14px;
}
.coop-section.remote .coop-name { color: #c792ea; }
.coop-badge {
    font-size: 10px; padding: 1px 6px; border-radius: 3px;
    background: #16213e; color: #888; text-transform: uppercase;
}
.coop-summary {
    display: flex; gap: 16px; font-size: 12px; color: #888; margin-bottom: 6px;
}
.coop-summary .cs-val { color: #c3cee3; font-weight: bold; }

/* Perf tab */
.perf-header {
    display: flex; align-items: center; gap: 16px; margin-bottom: 16px;
}
.perf-mode {
    font-size: 12px; color: #888; padding: 4px 10px;
    background: #16213e; border-radius: 4px;
}
.perf-mode .mode-val { color: #c792ea; font-weight: bold; }
.toggle-btn {
    padding: 6px 16px; border: 1px solid #7fdbca; background: transparent;
    color: #7fdbca; font-family: inherit; font-size: 12px; cursor: pointer;
    border-radius: 4px; text-transform: uppercase; letter-spacing: 1px;
}
.toggle-btn:hover { background: #7fdbca22; }
.toggle-btn.enabled { border-color: #f07178; color: #f07178; }
.toggle-btn.enabled:hover { background: #f0717822; }
.toggle-btn:disabled { opacity: 0.3; cursor: default; }

/* Counter table */
.counter-table {
    width: 100%; border-collapse: collapse; margin-bottom: 20px;
    background: #16213e; border-radius: 6px; overflow: hidden;
}
.counter-table th {
    text-align: left; padding: 8px 12px; color: #888; font-size: 11px;
    text-transform: uppercase; border-bottom: 1px solid #ffffff10;
}
.counter-table td {
    padding: 6px 12px; border-bottom: 1px solid #ffffff08; font-size: 13px;
}
.counter-table tr:last-child td { border-bottom: none; }
.counter-table .counter-name { color: #c3cee3; }
.counter-table .counter-value { color: #7fdbca; text-align: right; font-variant-numeric: tabular-nums; }
.counter-table .counter-rate { color: #c792ea; text-align: right; font-variant-numeric: tabular-nums; }

/* Chart group selector */
.chart-groups {
    display: flex; gap: 4px; margin-bottom: 12px;
}
.chart-group-btn {
    padding: 4px 12px; border: 1px solid #ffffff20; background: transparent;
    color: #888; font-family: inherit; font-size: 11px; cursor: pointer;
    border-radius: 3px; text-transform: uppercase;
}
.chart-group-btn.active { border-color: #7fdbca; color: #7fdbca; background: #7fdbca15; }
.chart-group-btn:hover { color: #c3cee3; }

/* Flame graph */
.flame-container {
    position: relative; background: #16213e; border-radius: 6px; padding: 12px;
}
.flame-toolbar {
    display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.flame-metric-btn {
    padding: 4px 12px; border: 1px solid #ffffff20; background: transparent;
    color: #888; font-family: inherit; font-size: 11px; cursor: pointer;
    border-radius: 3px; text-transform: uppercase;
}
.flame-metric-btn.active { border-color: #7fdbca; color: #7fdbca; background: #7fdbca15; }
.flame-metric-btn:hover { color: #c3cee3; }
.flame-breadcrumb {
    display: flex; align-items: center; gap: 4px;
    margin-left: 16px; font-size: 11px; color: #888;
}
.flame-crumb {
    cursor: pointer; color: #7fdbca; text-decoration: underline;
}
.flame-crumb:hover { color: #c3cee3; }
.flame-crumb-sep { color: #555; }
.flame-canvas { display: block; width: 100%; cursor: pointer; }
.flame-tooltip {
    display: none; position: absolute; background: #0f3460ee; color: #e0e0e0;
    padding: 8px 12px; border-radius: 4px; font-size: 12px; pointer-events: none;
    white-space: nowrap; z-index: 10; border: 1px solid #7fdbca44;
}
.flame-tooltip .ft-name { color: #c3cee3; font-weight: bold; }
.flame-tooltip .ft-state { font-size: 11px; margin-left: 6px; }
.flame-tooltip .ft-detail { color: #888; margin-top: 2px; }
.flame-empty { color: #555; padding: 40px; text-align: center; font-size: 13px; }

/* Sampler tab */
.sampler-controls {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    padding: 12px; background: #16213e; border-radius: 6px;
}
.sampler-controls label { color: #888; font-size: 12px; }
.sampler-controls input {
    width: 60px; padding: 4px 8px; background: #0f3460; border: 1px solid #ffffff20;
    color: #e0e0e0; font-family: inherit; font-size: 12px; border-radius: 3px;
    text-align: center;
}
.sampler-status { color: #888; font-size: 12px; margin-left: auto; }
.sampler-status .ss-active { color: #7fdbca; }
.sampler-status .ss-idle { color: #555; }
.sampler-flame {
    position: relative; background: #16213e; border-radius: 6px; padding: 12px;
}
.sampler-flame canvas { display: block; width: 100%; cursor: pointer; }
.sampler-tooltip {
    display: none; position: absolute; background: #0f3460ee; color: #e0e0e0;
    padding: 8px 12px; border-radius: 4px; font-size: 12px; pointer-events: none;
    white-space: nowrap; z-index: 10; border: 1px solid #7fdbca44;
}
.sampler-tooltip .st-name { color: #c3cee3; font-weight: bold; }
.sampler-tooltip .st-detail { color: #888; margin-top: 2px; }
.sampler-info {
    display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: #888;
}
.sampler-info .si-val { color: #7fdbca; font-weight: bold; }
</style>
</head>
<body>
<h1>coop dashboard</h1>

<div class="tabs">
    <button class="tab active" onclick="switchTab('status')">Status</button>
    <button class="tab" onclick="switchTab('flame')">Flame</button>
    <button class="tab" onclick="switchTab('perf')">Perf</button>
    <button class="tab" onclick="switchTab('sampler')">Sampler</button>
</div>

<!-- STATUS TAB -->
<div id="tab-status" class="tab-content active">
<div class="summary">
    <div class="stat"><span class="stat-label">cooperators</span><span class="stat-value" id="s-coops">-</span></div>
    <div class="stat"><span class="stat-label">contexts</span><span class="stat-value" id="s-ctx">-</span></div>
    <div class="stat"><span class="stat-label">yielded</span><span class="stat-value" id="s-yld">-</span></div>
    <div class="stat"><span class="stat-label">blocked</span><span class="stat-value" id="s-blk">-</span></div>
</div>
<div class="chart-container">
    <div class="chart-title">ticks per context (delta per update)</div>
    <canvas id="chart" height="180"></canvas>
    <div class="legend" id="legend"></div>
</div>
<div id="tree"></div>
</div>

<!-- FLAME TAB -->
<div id="tab-flame" class="tab-content">
<div class="flame-container">
    <div class="flame-toolbar">
        <button class="flame-metric-btn active" data-metric="deltaTicks" onclick="setFlameMetric(this)">Ticks</button>
        <button class="flame-metric-btn" data-metric="deltaYields" onclick="setFlameMetric(this)">Yields</button>
        <button class="flame-metric-btn" data-metric="deltaBlocks" onclick="setFlameMetric(this)">Blocks</button>
        <button class="flame-metric-btn" data-metric="deltaIoSubmits" onclick="setFlameMetric(this)">IO Sub</button>
        <button class="flame-metric-btn" data-metric="deltaIoCompletes" onclick="setFlameMetric(this)">IO Cmp</button>
        <div class="flame-breadcrumb" id="flame-breadcrumb"></div>
    </div>
    <canvas class="flame-canvas" id="flame-canvas" height="400"></canvas>
    <div class="flame-tooltip" id="flame-tooltip"></div>
    <div class="flame-empty" id="flame-empty">Waiting for data...</div>
</div>
</div>

<!-- PERF TAB -->
<div id="tab-perf" class="tab-content">
<div class="perf-header">
    <span class="perf-mode">mode <span class="mode-val" id="perf-mode">-</span></span>
    <span class="perf-mode">probes <span class="mode-val" id="perf-probes">-</span></span>
    <button class="toggle-btn" id="perf-toggle" onclick="togglePerf()" disabled>Enable</button>
</div>
<div class="summary" id="perf-summary"></div>
<div class="chart-container">
    <div class="chart-title">counter rates (per second)</div>
    <div class="chart-groups" id="perf-chart-groups"></div>
    <canvas id="perf-chart" height="240"></canvas>
    <div class="legend" id="perf-legend"></div>
</div>
<table class="counter-table">
    <thead><tr><th>Counter</th><th>Value</th><th>Rate /s</th></tr></thead>
    <tbody id="perf-table-body"></tbody>
</table>
</div>

<!-- SAMPLER TAB -->
<div id="tab-sampler" class="tab-content">
<div class="sampler-controls">
    <button class="toggle-btn" id="sampler-toggle" onclick="toggleSampler()">Start Sampling</button>
    <label>Hz:</label>
    <input type="number" id="sampler-hz" value="997" min="1" max="9999">
    <button class="chart-group-btn" id="sampler-mode" onclick="toggleSamplerMode()">Snapshot</button>
    <label><input type="checkbox" id="sampler-stacks"> Stacks</label>
    <span class="sampler-status" id="sampler-status"><span class="ss-idle">idle</span></span>
</div>
<div class="sampler-info" id="sampler-info">
    <span>samples: <span class="si-val" id="si-samples">0</span></span>
    <span>contexts: <span class="si-val" id="si-contexts">0</span></span>
    <span>symbols cached: <span class="si-val" id="si-symbols">0</span></span>
</div>
<div class="sampler-flame">
    <canvas id="sampler-canvas" height="300"></canvas>
    <div class="sampler-tooltip" id="sampler-tooltip"></div>
    <div class="flame-empty" id="sampler-empty">Click "Start Sampling" to begin CPU profiling</div>
</div>
</div>

<div id="updated"></div>

<script>
// ---- Tab switching ----
function switchTab(name) {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(t) { t.classList.remove('active'); });
    document.getElementById('tab-' + name).classList.add('active');
    document.querySelectorAll('.tab').forEach(function(t) {
        if (t.textContent.toLowerCase() === name) t.classList.add('active');
    });
}

// ---- Shared ----
var COLORS = [
    '#7fdbca', '#c792ea', '#f78c6c', '#82aaff', '#c3e88d',
    '#ff5370', '#e6db74', '#89ddff', '#f07178', '#ffcb6b'
];
var MAX_POINTS = 60;
var POLL_MS = 1000;

// ---- Status tab state ----
var statusHistory = {};
var prevTicks = null;
var statusColorMap = {};
var statusNextColor = 0;

function statusColorFor(name) {
    if (!(name in statusColorMap)) {
        statusColorMap[name] = COLORS[statusNextColor % COLORS.length];
        statusNextColor++;
    }
    return statusColorMap[name];
}

function coopLabel(co) {
    return co.name || '(unnamed)';
}

function flattenTicks(ctx, prefix, out) {
    var name = prefix ? prefix + '/' + ctx.name : ctx.name;
    out[name] = ctx.statistics.ticks;
    if (ctx.children) {
        for (var i = 0; i < ctx.children.length; i++) {
            flattenTicks(ctx.children[i], name, out);
        }
    }
}

function recordStatusDeltas(cooperators) {
    var current = {};
    for (var ci = 0; ci < cooperators.length; ci++) {
        var co = cooperators[ci];
        var prefix = cooperators.length > 1 ? coopLabel(co) : '';
        for (var i = 0; i < co.contexts.length; i++) {
            flattenTicks(co.contexts[i], prefix, current);
        }
    }
    if (prevTicks === null) { prevTicks = current; return; }
    var deltas = {};
    for (var name in current) {
        deltas[name] = current[name] - (prevTicks[name] || 0);
    }
    prevTicks = current;
    var active = {};
    for (var name in deltas) {
        active[name] = true;
        if (!statusHistory[name]) statusHistory[name] = [];
        statusHistory[name].push(deltas[name]);
        if (statusHistory[name].length > MAX_POINTS) statusHistory[name].shift();
    }
    for (var name in statusHistory) {
        if (!active[name]) delete statusHistory[name];
    }
}

function drawStackedChart(canvasId, legendId, hist, colorFn) {
    var canvas = document.getElementById(canvasId);
    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    var W = rect.width, H = rect.height;
    ctx.clearRect(0, 0, W, H);

    var names = Object.keys(hist);
    if (names.length === 0) return;

    var maxLen = 0;
    for (var i = 0; i < names.length; i++) {
        if (hist[names[i]].length > maxLen) maxLen = hist[names[i]].length;
    }

    var padL = 60, padR = 8, padT = 8, padB = 20;
    var plotW = W - padL - padR, plotH = H - padT - padB;

    // Build stacked columns
    var stacked = [];
    for (var col = 0; col < maxLen; col++) {
        stacked[col] = [];
        var cum = 0;
        for (var ni = 0; ni < names.length; ni++) {
            var h = hist[names[ni]];
            var offset = maxLen - h.length;
            cum += col >= offset ? h[col - offset] : 0;
            stacked[col].push(cum);
        }
    }

    var stackedMax = 1;
    for (var col = 0; col < maxLen; col++) {
        var top = stacked[col][names.length - 1];
        if (top > stackedMax) stackedMax = top;
    }

    function xFor(c) { return padL + (plotW / Math.max(MAX_POINTS - 1, 1)) * c; }
    function yFor(v) { return padT + plotH - (v / stackedMax) * plotH; }

    // Grid
    ctx.strokeStyle = '#ffffff10'; ctx.lineWidth = 1;
    for (var i = 0; i <= 4; i++) {
        var y = padT + (plotH / 4) * i;
        ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
        ctx.fillStyle = '#555'; ctx.font = '10px Consolas, Monaco, monospace';
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        ctx.fillText(formatNum(Math.round(stackedMax * (1 - i / 4))), padL - 6, y);
    }

    // Areas
    for (var ni = names.length - 1; ni >= 0; ni--) {
        ctx.fillStyle = colorFn(names[ni]) + '40';
        ctx.strokeStyle = colorFn(names[ni]);
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(xFor(0), yFor(0));
        for (var col = 0; col < maxLen; col++) ctx.lineTo(xFor(col), yFor(stacked[col][ni]));
        for (var col = maxLen - 1; col >= 0; col--) {
            ctx.lineTo(xFor(col), yFor(ni > 0 ? stacked[col][ni - 1] : 0));
        }
        ctx.closePath(); ctx.fill();
        ctx.beginPath();
        for (var col = 0; col < maxLen; col++) {
            if (col === 0) ctx.moveTo(xFor(col), yFor(stacked[col][ni]));
            else ctx.lineTo(xFor(col), yFor(stacked[col][ni]));
        }
        ctx.stroke();
    }

    // Legend
    var legend = document.getElementById(legendId);
    legend.innerHTML = '';
    for (var i = 0; i < names.length; i++) {
        var item = document.createElement('span');
        item.className = 'legend-item';
        var swatch = document.createElement('span');
        swatch.className = 'legend-swatch';
        swatch.style.backgroundColor = colorFn(names[i]);
        item.appendChild(swatch);
        item.appendChild(document.createTextNode(names[i]));
        legend.appendChild(item);
    }
}

function formatNum(n) {
    if (n >= 1e9) return (n / 1e9).toFixed(1) + 'G';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return '' + n;
}

function renderCtx(c, root) {
    var d = document.createElement('div');
    d.className = 'ctx' + (root ? ' ctx-root' : '');
    var h = document.createElement('div');
    h.className = 'ctx-header';
    var name = document.createElement('span');
    name.className = 'ctx-name';
    name.textContent = c.name;
    h.appendChild(name);
    var b = document.createElement('span');
    b.className = 'badge badge-' + c.state;
    b.textContent = c.state;
    h.appendChild(b);
    if (c.killed) {
        var k = document.createElement('span');
        k.className = 'badge badge-killed';
        k.textContent = 'killed';
        h.appendChild(k);
    }
    d.appendChild(h);
    var s = document.createElement('div');
    s.className = 'ctx-stats';
    s.textContent = 'ticks=' + c.statistics.ticks +
        ' yields=' + c.statistics.yields +
        ' blocks=' + c.statistics.blocks +
        ' io=' + (c.statistics.ioSubmits || 0) + '/' + (c.statistics.ioCompletes || 0) +
        ' priority=' + c.priority;
    d.appendChild(s);
    if (c.children) {
        for (var i = 0; i < c.children.length; i++) {
            d.appendChild(renderCtx(c.children[i], false));
        }
    }
    return d;
}

function renderCoopSection(co, isMulti) {
    var section = document.createElement('div');
    var isRemote = co.contexts.length === 0 && co.contextsCount > 0;
    section.className = 'coop-section' + (isRemote ? ' remote' : '');

    if (isMulti) {
        var header = document.createElement('div');
        header.className = 'coop-header';
        var name = document.createElement('span');
        name.className = 'coop-name';
        name.textContent = coopLabel(co);
        header.appendChild(name);
        if (isRemote) {
            var badge = document.createElement('span');
            badge.className = 'coop-badge';
            badge.textContent = 'remote';
            header.appendChild(badge);
        }
        section.appendChild(header);
    }

    var summary = document.createElement('div');
    summary.className = 'coop-summary';
    summary.innerHTML =
        'contexts: <span class="cs-val">' + co.contextsCount + '</span> ' +
        'yielded: <span class="cs-val">' + co.yieldedCount + '</span> ' +
        'blocked: <span class="cs-val">' + co.blockedCount + '</span> ' +
        'ticks: <span class="cs-val">' + co.ticks + '</span>';
    section.appendChild(summary);

    for (var i = 0; i < co.contexts.length; i++) {
        section.appendChild(renderCtx(co.contexts[i], true));
    }
    if (isRemote) {
        var note = document.createElement('div');
        note.style.cssText = 'color:#555;font-size:11px;font-style:italic;margin-top:4px';
        note.textContent = 'context tree not available for remote cooperators';
        section.appendChild(note);
    }
    return section;
}

function refreshStatus(data) {
    var cooperators = data.cooperators;
    var isMulti = cooperators.length > 1;

    // Aggregate stats
    var totalCtx = 0, totalYld = 0, totalBlk = 0;
    for (var i = 0; i < cooperators.length; i++) {
        totalCtx += cooperators[i].contextsCount;
        totalYld += cooperators[i].yieldedCount;
        totalBlk += cooperators[i].blockedCount;
    }

    document.getElementById('s-coops').textContent = cooperators.length;
    document.getElementById('s-ctx').textContent = totalCtx;
    document.getElementById('s-yld').textContent = totalYld;
    document.getElementById('s-blk').textContent = totalBlk;

    recordStatusDeltas(cooperators);
    drawStackedChart('chart', 'legend', statusHistory, statusColorFor);

    var tree = document.getElementById('tree');
    tree.innerHTML = '';
    for (var i = 0; i < cooperators.length; i++) {
        tree.appendChild(renderCoopSection(cooperators[i], isMulti));
    }
}

// ---- Perf tab state ----
var COUNTER_GROUPS = {
    'all':       null,
    'scheduler': ['scheduler_loop', 'ctx_resume', 'ctx_yield', 'ctx_block', 'ctx_spawn', 'ctx_exit'],
    'io':        ['io_submit', 'io_complete', 'poll_cycle', 'poll_submit', 'poll_cqe'],
};
var perfActiveGroup = 'all';
var perfHistory = {};
var perfPrev = null;
var perfLastTime = null;
var perfRates = {};
var perfColorMap = {};
var perfNextColor = 0;
var perfHidden = {};

function perfColorFor(name) {
    if (!(name in perfColorMap)) {
        perfColorMap[name] = COLORS[perfNextColor % COLORS.length];
        perfNextColor++;
    }
    return perfColorMap[name];
}

function initPerfGroups() {
    var container = document.getElementById('perf-chart-groups');
    container.innerHTML = '';
    for (var group in COUNTER_GROUPS) {
        var btn = document.createElement('button');
        btn.className = 'chart-group-btn' + (group === perfActiveGroup ? ' active' : '');
        btn.textContent = group;
        btn.setAttribute('data-group', group);
        btn.onclick = function() {
            perfActiveGroup = this.getAttribute('data-group');
            document.querySelectorAll('.chart-group-btn').forEach(function(b) {
                b.classList.toggle('active', b.getAttribute('data-group') === perfActiveGroup);
            });
            drawPerfChart();
        };
        container.appendChild(btn);
    }
}

function filteredPerfHistory() {
    var filter = COUNTER_GROUPS[perfActiveGroup];
    if (!filter) return perfHistory;
    var out = {};
    for (var i = 0; i < filter.length; i++) {
        if (perfHistory[filter[i]]) out[filter[i]] = perfHistory[filter[i]];
    }
    return out;
}

function drawPerfChart() {
    var hist = filteredPerfHistory();
    // Remove hidden series
    var visible = {};
    for (var k in hist) {
        if (!perfHidden[k]) visible[k] = hist[k];
    }
    drawStackedChart('perf-chart', 'perf-legend', visible, perfColorFor);

    // Make legend items clickable for toggling
    var legend = document.getElementById('perf-legend');
    var items = legend.querySelectorAll('.legend-item');
    var names = Object.keys(hist);
    items.forEach(function(item, i) {
        var name = names[i];
        if (!name) return;
        if (perfHidden[name]) item.classList.add('dimmed');
        item.onclick = function() {
            perfHidden[name] = !perfHidden[name];
            drawPerfChart();
        };
    });
}

function aggregateCounters(cooperators) {
    // Merge counters from all cooperators into a single map
    var merged = {};
    for (var ci = 0; ci < cooperators.length; ci++) {
        var counters = cooperators[ci].counters;
        for (var name in counters) {
            merged[name] = (merged[name] || 0) + counters[name];
        }
    }
    return merged;
}

function refreshPerf(data) {
    // Header
    var modeNames = {0: 'disabled', 1: 'always-on', 2: 'dynamic'};
    document.getElementById('perf-mode').textContent =
        data.mode + ' (' + (modeNames[data.mode] || '?') + ')';
    document.getElementById('perf-probes').textContent = data.probeCount;

    var toggleBtn = document.getElementById('perf-toggle');
    if (data.mode === 2) {
        toggleBtn.disabled = false;
        toggleBtn.textContent = data.enabled ? 'Disable' : 'Enable';
        toggleBtn.className = 'toggle-btn' + (data.enabled ? ' enabled' : '');
    } else {
        toggleBtn.disabled = true;
        toggleBtn.textContent = data.mode === 1 ? 'Always On' : 'Disabled';
        toggleBtn.className = 'toggle-btn';
    }

    // Aggregate counters across all cooperators
    var cooperators = data.cooperators || [];
    var counters = aggregateCounters(cooperators);
    var names = Object.keys(counters);

    // Compute rates
    var now = Date.now();

    if (perfPrev !== null && perfLastTime !== null) {
        var dt = (now - perfLastTime) / 1000;
        if (dt > 0) {
            for (var i = 0; i < names.length; i++) {
                var name = names[i];
                var delta = counters[name] - (perfPrev[name] || 0);
                var rate = Math.round(delta / dt);
                perfRates[name] = rate;

                if (!perfHistory[name]) perfHistory[name] = [];
                perfHistory[name].push(rate);
                if (perfHistory[name].length > MAX_POINTS) perfHistory[name].shift();
            }
        }
    }
    perfPrev = counters;
    perfLastTime = now;

    // Summary — top 6 counters by rate
    var summary = document.getElementById('perf-summary');
    summary.innerHTML = '';
    var sorted = names.slice().sort(function(a, b) { return (perfRates[b] || 0) - (perfRates[a] || 0); });
    var topN = Math.min(6, sorted.length);
    for (var i = 0; i < topN; i++) {
        var name = sorted[i];
        var div = document.createElement('div');
        div.className = 'stat';
        var label = document.createElement('span');
        label.className = 'stat-label';
        label.textContent = name;
        div.appendChild(label);
        var val = document.createElement('span');
        val.className = 'stat-value';
        val.textContent = formatNum(perfRates[name] || 0) + '/s';
        div.appendChild(val);
        summary.appendChild(div);
    }

    // Table — show per-cooperator breakdown if multiple
    var tbody = document.getElementById('perf-table-body');
    tbody.innerHTML = '';
    var isMulti = cooperators.length > 1;

    if (isMulti) {
        // Header row per cooperator
        var headerTr = document.createElement('tr');
        var th0 = document.createElement('th');
        th0.textContent = 'Counter';
        headerTr.appendChild(th0);
        for (var ci = 0; ci < cooperators.length; ci++) {
            var th = document.createElement('th');
            th.textContent = coopLabel(cooperators[ci]);
            th.style.textAlign = 'right';
            headerTr.appendChild(th);
        }
        var thTotal = document.createElement('th');
        thTotal.textContent = 'Total';
        thTotal.style.textAlign = 'right';
        headerTr.appendChild(thTotal);
        var thRate = document.createElement('th');
        thRate.textContent = 'Rate /s';
        thRate.style.textAlign = 'right';
        headerTr.appendChild(thRate);
        tbody.appendChild(headerTr);
    }

    for (var i = 0; i < names.length; i++) {
        var name = names[i];
        var tr = document.createElement('tr');
        var tdName = document.createElement('td');
        tdName.className = 'counter-name';
        tdName.textContent = name;
        tr.appendChild(tdName);

        if (isMulti) {
            for (var ci = 0; ci < cooperators.length; ci++) {
                var td = document.createElement('td');
                td.className = 'counter-value';
                var val = cooperators[ci].counters[name] || 0;
                td.textContent = val.toLocaleString();
                tr.appendChild(td);
            }
        }

        var tdVal = document.createElement('td');
        tdVal.className = 'counter-value';
        tdVal.textContent = counters[name].toLocaleString();
        tr.appendChild(tdVal);
        var tdRate = document.createElement('td');
        tdRate.className = 'counter-rate';
        tdRate.textContent = perfRates[name] !== undefined ? formatNum(perfRates[name]) + '/s' : '-';
        tr.appendChild(tdRate);
        tbody.appendChild(tr);
    }

    drawPerfChart();
}

function togglePerf() {
    var btn = document.getElementById('perf-toggle');
    var action = btn.textContent.toLowerCase() === 'enable' ? 'enable' : 'disable';
    fetch('/api/perf/' + action, {method: 'POST'}).then(function() {
        refresh();
    });
}

// ---- Flame graph ----
var flamePrevSnapshot = null;  // {name -> {ticks, yields, blocks}}
var flameDeltaRoots = null;    // enriched tree with deltas
var flameMetric = 'deltaTicks';
var flameZoomNode = null;      // null = show all roots
var flameRects = [];           // layout output for hit testing
var FLAME_BAR_H = 22;
var FLAME_MIN_PX = 2;

// Build a flat snapshot from the context tree: key=path, val={ticks,yields,blocks,name,state}
//
function flameSnapshot(contexts) {
    var snap = {};
    function walk(ctx, prefix) {
        var path = prefix ? prefix + '/' + ctx.name : ctx.name;
        snap[path] = {
            ticks: ctx.statistics.ticks,
            yields: ctx.statistics.yields,
            blocks: ctx.statistics.blocks,
            ioSubmits: ctx.statistics.ioSubmits || 0,
            ioCompletes: ctx.statistics.ioCompletes || 0
        };
        if (ctx.children) {
            for (var i = 0; i < ctx.children.length; i++) walk(ctx.children[i], path);
        }
    }
    for (var i = 0; i < contexts.length; i++) walk(contexts[i], '');
    return snap;
}

// Enrich tree nodes with delta values and totalDelta (self + all descendants)
//
function computeFlameDelta(contexts, prev) {
    function enrichNode(ctx, prefix) {
        var path = prefix ? prefix + '/' + ctx.name : ctx.name;
        var p = prev[path] || {ticks: 0, yields: 0, blocks: 0, ioSubmits: 0, ioCompletes: 0};
        var node = {
            name: ctx.name,
            state: ctx.state,
            deltaTicks: ctx.statistics.ticks - p.ticks,
            deltaYields: ctx.statistics.yields - p.yields,
            deltaBlocks: ctx.statistics.blocks - p.blocks,
            deltaIoSubmits: (ctx.statistics.ioSubmits || 0) - p.ioSubmits,
            deltaIoCompletes: (ctx.statistics.ioCompletes || 0) - p.ioCompletes,
            children: []
        };
        if (ctx.children) {
            for (var i = 0; i < ctx.children.length; i++) {
                node.children.push(enrichNode(ctx.children[i], path));
            }
        }
        // totalDelta = self metric + all descendants' metric (computed per metric later)
        return node;
    }
    var roots = [];
    for (var i = 0; i < contexts.length; i++) roots.push(enrichNode(contexts[i], ''));
    return roots;
}

function flameTotal(node, metric) {
    var t = node[metric];
    for (var i = 0; i < node.children.length; i++) t += flameTotal(node.children[i], metric);
    return t;
}

// Flatten tree into drawable rectangles
//
function flattenFlame(nodes, metric, totalWidth, canvasW) {
    var rects = [];
    // If totalWidth is 0, nothing to draw
    if (totalWidth <= 0) return rects;

    function layout(node, depth, x, parentW) {
        var nodeTotal = flameTotal(node, metric);
        var w = (nodeTotal / totalWidth) * canvasW;
        if (w < FLAME_MIN_PX) w = FLAME_MIN_PX;
        var selfVal = node[metric];
        var childrenTotal = 0;
        for (var i = 0; i < node.children.length; i++) {
            childrenTotal += flameTotal(node.children[i], metric);
        }
        rects.push({
            x: x, w: w, depth: depth,
            name: node.name, state: node.state,
            value: nodeTotal, selfValue: selfVal,
            node: node
        });
        // Layout children within this node's span
        var cx = x;
        for (var i = 0; i < node.children.length; i++) {
            var childTotal = flameTotal(node.children[i], metric);
            var cw = (childTotal / totalWidth) * canvasW;
            if (cw < FLAME_MIN_PX) cw = FLAME_MIN_PX;
            layout(node.children[i], depth + 1, cx, cw);
            cx += cw;
        }
    }

    var x = 0;
    for (var i = 0; i < nodes.length; i++) {
        layout(nodes[i], 0, x, 0);
        var nodeTotal = flameTotal(nodes[i], metric);
        x += (nodeTotal / totalWidth) * canvasW;
    }
    return rects;
}

function flameColorForState(state, name) {
    var base;
    if (state === 'running') base = [127, 219, 202];
    else if (state === 'yielded') base = [230, 219, 116];
    else base = [240, 113, 120]; // blocked
    // Hash name for saturation variation
    var hash = 0;
    for (var i = 0; i < name.length; i++) hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
    var variation = ((hash & 0x7f) - 64) * 0.15; // -0.15 to +0.15
    var r = Math.max(0, Math.min(255, base[0] + base[0] * variation));
    var g = Math.max(0, Math.min(255, base[1] + base[1] * variation));
    var b = Math.max(0, Math.min(255, base[2] + base[2] * variation));
    return 'rgb(' + Math.round(r) + ',' + Math.round(g) + ',' + Math.round(b) + ')';
}

function drawFlame() {
    var canvas = document.getElementById('flame-canvas');
    var emptyDiv = document.getElementById('flame-empty');
    if (!flameDeltaRoots || flameDeltaRoots.length === 0) {
        canvas.style.display = 'none';
        emptyDiv.style.display = 'block';
        emptyDiv.textContent = flamePrevSnapshot ? 'No active contexts' : 'Waiting for data...';
        return;
    }

    // Determine what to draw: zoomed node or all roots
    var drawNodes = flameZoomNode ? [flameZoomNode] : flameDeltaRoots;

    var totalW = 0;
    for (var i = 0; i < drawNodes.length; i++) totalW += flameTotal(drawNodes[i], flameMetric);

    if (totalW <= 0) {
        canvas.style.display = 'none';
        emptyDiv.style.display = 'block';
        emptyDiv.textContent = 'No activity in current interval';
        return;
    }

    canvas.style.display = 'block';
    emptyDiv.style.display = 'none';

    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.getBoundingClientRect();
    var W = rect.width;

    // Compute rects to find max depth
    flameRects = flattenFlame(drawNodes, flameMetric, totalW, W);
    var maxDepth = 0;
    for (var i = 0; i < flameRects.length; i++) {
        if (flameRects[i].depth > maxDepth) maxDepth = flameRects[i].depth;
    }
    var H = (maxDepth + 1) * (FLAME_BAR_H + 1) + 8;
    canvas.height = H * dpr;
    canvas.style.height = H + 'px';
    canvas.width = W * dpr;

    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, W, H);

    for (var i = 0; i < flameRects.length; i++) {
        var r = flameRects[i];
        var y = r.depth * (FLAME_BAR_H + 1) + 1;

        ctx.fillStyle = flameColorForState(r.state, r.name);
        ctx.fillRect(r.x, y, Math.max(r.w - 1, 1), FLAME_BAR_H);

        // Text label if bar is wide enough
        if (r.w > 40) {
            ctx.fillStyle = '#000';
            ctx.font = '11px Consolas, Monaco, monospace';
            ctx.textBaseline = 'middle';
            var label = r.name;
            var maxTextW = r.w - 6;
            if (ctx.measureText(label).width > maxTextW) {
                while (label.length > 1 && ctx.measureText(label + '…').width > maxTextW) {
                    label = label.slice(0, -1);
                }
                label += '…';
            }
            ctx.fillText(label, r.x + 3, y + FLAME_BAR_H / 2);
        }
    }
}

function flameHitTest(mx, my) {
    for (var i = flameRects.length - 1; i >= 0; i--) {
        var r = flameRects[i];
        var y = r.depth * (FLAME_BAR_H + 1) + 1;
        if (mx >= r.x && mx <= r.x + r.w && my >= y && my <= y + FLAME_BAR_H) {
            return r;
        }
    }
    return null;
}

function updateFlameBreadcrumb() {
    var bc = document.getElementById('flame-breadcrumb');
    bc.innerHTML = '';
    if (!flameZoomNode) return;
    // Build path from root to zoom node
    var path = [];
    function findPath(nodes, target) {
        for (var i = 0; i < nodes.length; i++) {
            if (nodes[i] === target) { path.push(nodes[i]); return true; }
            if (findPath(nodes[i].children, target)) { path.push(nodes[i]); return true; }
        }
        return false;
    }
    if (flameDeltaRoots) findPath(flameDeltaRoots, flameZoomNode);
    path.reverse();

    // "root" link
    var root = document.createElement('span');
    root.className = 'flame-crumb';
    root.textContent = 'root';
    root.onclick = function() { flameZoomNode = null; updateFlameBreadcrumb(); drawFlame(); };
    bc.appendChild(root);

    for (var i = 0; i < path.length; i++) {
        var sep = document.createElement('span');
        sep.className = 'flame-crumb-sep';
        sep.textContent = ' › ';
        bc.appendChild(sep);

        var crumb = document.createElement('span');
        if (i < path.length - 1) {
            crumb.className = 'flame-crumb';
            crumb.onclick = (function(node) {
                return function() { flameZoomNode = node; updateFlameBreadcrumb(); drawFlame(); };
            })(path[i]);
        } else {
            crumb.style.color = '#c3cee3';
        }
        crumb.textContent = path[i].name;
        bc.appendChild(crumb);
    }
}

function setFlameMetric(btn) {
    flameMetric = btn.getAttribute('data-metric');
    document.querySelectorAll('.flame-metric-btn').forEach(function(b) {
        b.classList.toggle('active', b === btn);
    });
    drawFlame();
}

// Canvas mouse handlers
//
(function() {
    var canvas = document.getElementById('flame-canvas');
    var tooltip = document.getElementById('flame-tooltip');

    canvas.addEventListener('mousemove', function(e) {
        var rect = canvas.getBoundingClientRect();
        var mx = e.clientX - rect.left;
        var my = e.clientY - rect.top;
        var hit = flameHitTest(mx, my);
        if (hit) {
            var metricLabel = flameMetric.replace('delta', '').toLowerCase();
            var grandTotal = 0;
            var drawNodes = flameZoomNode ? [flameZoomNode] : (flameDeltaRoots || []);
            for (var i = 0; i < drawNodes.length; i++) grandTotal += flameTotal(drawNodes[i], flameMetric);
            var pct = grandTotal > 0 ? (hit.value / grandTotal * 100).toFixed(1) : '0.0';
            tooltip.innerHTML =
                '<div><span class="ft-name">' + hit.name + '</span>' +
                '<span class="ft-state badge badge-' + hit.state + '">' + hit.state + '</span></div>' +
                '<div class="ft-detail">' + metricLabel + ': ' + hit.value +
                ' (' + pct + '%) — self: ' + hit.selfValue + '</div>';
            tooltip.style.display = 'block';
            var tx = e.clientX - canvas.parentElement.getBoundingClientRect().left + 12;
            var ty = e.clientY - canvas.parentElement.getBoundingClientRect().top + 12;
            // Keep tooltip in view
            if (tx + tooltip.offsetWidth > canvas.parentElement.offsetWidth - 8) {
                tx = tx - tooltip.offsetWidth - 24;
            }
            tooltip.style.left = tx + 'px';
            tooltip.style.top = ty + 'px';
        } else {
            tooltip.style.display = 'none';
        }
    });

    canvas.addEventListener('mouseleave', function() {
        tooltip.style.display = 'none';
    });

    canvas.addEventListener('click', function(e) {
        var rect = canvas.getBoundingClientRect();
        var mx = e.clientX - rect.left;
        var my = e.clientY - rect.top;
        var hit = flameHitTest(mx, my);
        if (hit && hit.node.children.length > 0) {
            flameZoomNode = hit.node;
            updateFlameBreadcrumb();
            drawFlame();
        } else if (!hit) {
            // Click background = zoom out one level or reset
            flameZoomNode = null;
            updateFlameBreadcrumb();
            drawFlame();
        }
    });
})();

function refreshFlame(data) {
    // Gather all contexts from all cooperators
    var cooperators = data.cooperators;
    var allContexts = [];
    for (var ci = 0; ci < cooperators.length; ci++) {
        var co = cooperators[ci];
        if (cooperators.length > 1) {
            // Wrap each cooperator's contexts under a virtual cooperator node
            allContexts.push({
                name: coopLabel(co),
                state: 'running',
                killed: false,
                priority: 0,
                statistics: {ticks: co.ticks, yields: 0, blocks: 0, ioSubmits: 0, ioCompletes: 0},
                children: co.contexts
            });
        } else {
            for (var i = 0; i < co.contexts.length; i++) {
                allContexts.push(co.contexts[i]);
            }
        }
    }

    var currentSnap = flameSnapshot(allContexts);
    if (flamePrevSnapshot === null) {
        flamePrevSnapshot = currentSnap;
        return;
    }
    flameDeltaRoots = computeFlameDelta(allContexts, flamePrevSnapshot);
    flamePrevSnapshot = currentSnap;

    // If zoomed node no longer exists, reset zoom
    if (flameZoomNode) {
        var found = false;
        function findNode(nodes, target) {
            for (var i = 0; i < nodes.length; i++) {
                if (nodes[i].name === target.name) { flameZoomNode = nodes[i]; found = true; return; }
                findNode(nodes[i].children, target);
                if (found) return;
            }
        }
        findNode(flameDeltaRoots, flameZoomNode);
        if (!found) { flameZoomNode = null; updateFlameBreadcrumb(); }
    }

    if (document.getElementById('tab-flame').classList.contains('active')) {
        drawFlame();
    }
}

// ---- Sampler ----
var samplerActive = false;
var samplerCycleRunning = false;
var samplerSymbolCache = {};  // pc string -> symbol name
var samplerFlameData = null;  // {contexts: [{name, samples, functions: [{name, count}]}]}
var samplerRects = [];
var SAMPLER_BAR_H = 22;
var samplerCumulative = false;
var samplerAccum = {};  // coopName -> {ctxName -> {funcMap: {sym -> count}, total}}
var samplerAccumTotal = 0;

function toggleSampler() {
    samplerActive = !samplerActive;
    var btn = document.getElementById('sampler-toggle');
    btn.textContent = samplerActive ? 'Stop Sampling' : 'Start Sampling';
    btn.className = 'toggle-btn' + (samplerActive ? ' enabled' : '');
    if (samplerActive) {
        // Reset accumulator on start
        samplerAccum = {};
        samplerAccumTotal = 0;
        runSamplerCycle();
    }
}

function toggleSamplerMode() {
    samplerCumulative = !samplerCumulative;
    var btn = document.getElementById('sampler-mode');
    btn.textContent = samplerCumulative ? 'Cumulative' : 'Snapshot';
    btn.className = 'chart-group-btn' + (samplerCumulative ? ' active' : '');
    // Reset accumulator when switching modes
    samplerAccum = {};
    samplerAccumTotal = 0;
}

function runSamplerCycle() {
    if (!samplerActive || samplerCycleRunning) return;
    samplerCycleRunning = true;

    var hz = parseInt(document.getElementById('sampler-hz').value) || 997;
    var useStacks = document.getElementById('sampler-stacks').checked;
    var statusEl = document.getElementById('sampler-status');
    statusEl.innerHTML = '<span class="ss-active">sampling at ' + hz + ' Hz' +
        (useStacks ? ' (stacks)' : '') + '...</span>';

    fetch('/api/sampler/start?hz=' + hz + (useStacks ? '&stacks=1' : ''), {method: 'POST'})
        .then(function() {
            // Wait 1 second for samples to accumulate
            //
            return new Promise(function(resolve) { setTimeout(resolve, 1000); });
        })
        .then(function() {
            return fetch('/api/sampler/stop', {method: 'POST'});
        })
        .then(function() {
            statusEl.innerHTML = '<span class="ss-active">reading samples...</span>';
            return fetch('/api/sampler/samples').then(function(r) { return r.json(); });
        })
        .then(function(data) {
            // Find PCs we haven't symbolized yet — from both PC ring and stack ring
            //
            var unknownPCs = [];
            for (var i = 0; i < data.samples.length; i++) {
                if (!samplerSymbolCache[data.samples[i].pc])
                    unknownPCs.push(data.samples[i].pc);
            }
            if (data.stackSamples) {
                for (var i = 0; i < data.stackSamples.length; i++) {
                    var frames = data.stackSamples[i].frames || [];
                    for (var f = 0; f < frames.length; f++) {
                        if (!samplerSymbolCache[frames[f]]) unknownPCs.push(frames[f]);
                    }
                }
            }

            if (unknownPCs.length > 0) {
                statusEl.innerHTML = '<span class="ss-active">resolving ' +
                    unknownPCs.length + ' symbols...</span>';
                // Deduplicate
                //
                var unique = {};
                for (var i = 0; i < unknownPCs.length; i++) unique[unknownPCs[i]] = true;
                var body = Object.keys(unique).join(',');
                return fetch('/api/sampler/symbolize', {
                    method: 'POST',
                    body: body
                }).then(function(r) { return r.json(); }).then(function(syms) {
                    for (var pc in syms.symbols) {
                        samplerSymbolCache[pc] = syms.symbols[pc];
                    }
                    return data;
                });
            }
            return data;
        })
        .then(function(data) {
            buildSamplerFlame(data);
            if (document.getElementById('tab-sampler').classList.contains('active')) {
                drawSamplerFlame();
            }

            statusEl.innerHTML = '<span class="ss-idle">idle — ' +
                data.count + ' samples</span>';
            samplerCycleRunning = false;

            // Auto-repeat if still active
            //
            if (samplerActive) {
                setTimeout(runSamplerCycle, 500);
            }
        })
        .catch(function(e) {
            statusEl.innerHTML = '<span style="color:#f07178">error: ' +
                e.message + '</span>';
            samplerCycleRunning = false;
            samplerActive = false;
            var btn = document.getElementById('sampler-toggle');
            btn.textContent = 'Start Sampling';
            btn.className = 'toggle-btn';
        });
}

function ingestSamples(data) {
    if (data.stacks && data.stackSamples) {
        return ingestStackSamples(data);
    }
    // PC-only mode: parse into the coopMap structure
    //
    var coopMap = {};
    var count = 0;

    for (var i = 0; i < data.samples.length; i++) {
        var s = data.samples[i];
        var coopName = s.cooperator || '(none)';
        var ctxName = s.context || '(cooperator)';
        var symbol = samplerSymbolCache[s.pc] || s.pc;
        var shortSym = shortenSymbol(symbol);

        if (!coopMap[coopName]) coopMap[coopName] = {ctxMap: {}, total: 0};
        if (!coopMap[coopName].ctxMap[ctxName])
            coopMap[coopName].ctxMap[ctxName] = {funcMap: {}, total: 0};
        coopMap[coopName].ctxMap[ctxName].funcMap[shortSym] =
            (coopMap[coopName].ctxMap[ctxName].funcMap[shortSym] || 0) + 1;
        coopMap[coopName].ctxMap[ctxName].total++;
        coopMap[coopName].total++;
        count++;
    }
    return {coopMap: coopMap, count: count, stacks: false};
}

// Build a call tree from stack samples. Each sample has frames[] from leaf to root.
// We build a tree from root to leaf (flame graph convention).
//
function ingestStackSamples(data) {
    // stackTree: coopName -> ctxName -> tree node
    // tree node: {name, count, children: {name -> node}}
    //
    var coopMap = {};
    var count = 0;
    var stackSamples = data.stackSamples || [];

    for (var i = 0; i < stackSamples.length; i++) {
        var s = stackSamples[i];
        var coopName = s.cooperator || '(none)';
        var ctxName = s.context || '(cooperator)';
        var frames = s.frames || [];

        if (!coopMap[coopName]) coopMap[coopName] = {trees: {}, total: 0};
        if (!coopMap[coopName].trees[ctxName])
            coopMap[coopName].trees[ctxName] = {name: ctxName, count: 0, children: {}};

        var node = coopMap[coopName].trees[ctxName];
        node.count++;
        coopMap[coopName].total++;
        count++;

        // Walk frames from root (last) to leaf (first) to build top-down tree
        //
        for (var f = frames.length - 1; f >= 0; f--) {
            var sym = samplerSymbolCache[frames[f]] || frames[f];
            var shortSym = shortenSymbol(sym);
            if (!node.children[shortSym]) {
                node.children[shortSym] = {name: shortSym, count: 0, children: {}};
            }
            node.children[shortSym].count++;
            node = node.children[shortSym];
        }
    }
    return {coopMap: coopMap, count: count, stacks: true};
}

function mergeTreeNodes(dst, src) {
    dst.count += src.count;
    for (var childName in src.children) {
        if (!dst.children[childName]) {
            dst.children[childName] = {name: childName, count: 0, children: {}};
        }
        mergeTreeNodes(dst.children[childName], src.children[childName]);
    }
}

function mergeIntoAccum(ingested) {
    var coopMap = ingested.coopMap;
    var isStacks = ingested.stacks;

    for (var coopName in coopMap) {
        var cm = coopMap[coopName];

        if (isStacks) {
            if (!samplerAccum[coopName]) samplerAccum[coopName] = {trees: {}, total: 0};
            for (var ctxName in cm.trees) {
                if (!samplerAccum[coopName].trees[ctxName]) {
                    samplerAccum[coopName].trees[ctxName] = {
                        name: ctxName, count: 0, children: {}
                    };
                }
                mergeTreeNodes(samplerAccum[coopName].trees[ctxName], cm.trees[ctxName]);
            }
            samplerAccum[coopName].total += cm.total;
        } else {
            if (!samplerAccum[coopName]) samplerAccum[coopName] = {ctxMap: {}, total: 0};
            for (var ctxName in cm.ctxMap) {
                if (!samplerAccum[coopName].ctxMap[ctxName])
                    samplerAccum[coopName].ctxMap[ctxName] = {funcMap: {}, total: 0};
                var src = cm.ctxMap[ctxName];
                var dst = samplerAccum[coopName].ctxMap[ctxName];
                for (var fn in src.funcMap) {
                    dst.funcMap[fn] = (dst.funcMap[fn] || 0) + src.funcMap[fn];
                }
                dst.total += src.total;
            }
            samplerAccum[coopName].total += cm.total;
        }
    }
}

function coopMapToFlameData(coopMap, totalSamples, isStacks) {
    if (isStacks) return treeToFlameData(coopMap, totalSamples);

    var coopNames = Object.keys(coopMap);
    var hasMultipleCoops = coopNames.length > 1;

    var contexts = [];
    for (var ci = 0; ci < coopNames.length; ci++) {
        var coopName = coopNames[ci];
        var cm = coopMap[coopName];
        var ctxNames = Object.keys(cm.ctxMap);

        for (var ti = 0; ti < ctxNames.length; ti++) {
            var ctxName = ctxNames[ti];
            var ctxData = cm.ctxMap[ctxName];
            var functions = [];
            for (var fn in ctxData.funcMap) {
                functions.push({name: fn, count: ctxData.funcMap[fn]});
            }
            functions.sort(function(a, b) { return b.count - a.count; });
            var displayName = hasMultipleCoops ? coopName + '/' + ctxName : ctxName;
            contexts.push({
                name: displayName, samples: ctxData.total, functions: functions,
                cooperator: coopName
            });
        }
    }
    contexts.sort(function(a, b) { return b.samples - a.samples; });
    return {contexts: contexts, total: totalSamples, stacks: false};
}

// Convert tree-structured coopMap into flame graph data.
// Returns {roots: [{name, count, children: [...]}], total, stacks: true}
// Each root is a context, children are sorted by count descending.
//
function treeToFlameData(coopMap, totalSamples) {
    var coopNames = Object.keys(coopMap);
    var hasMultipleCoops = coopNames.length > 1;

    var roots = [];
    for (var ci = 0; ci < coopNames.length; ci++) {
        var coopName = coopNames[ci];
        var cm = coopMap[coopName];
        for (var ctxName in cm.trees) {
            var tree = cm.trees[ctxName];
            var displayName = hasMultipleCoops ? coopName + '/' + ctxName : ctxName;
            roots.push(flattenTree(tree, displayName));
        }
    }
    roots.sort(function(a, b) { return b.count - a.count; });
    return {roots: roots, total: totalSamples, stacks: true};
}

// Convert {name, count, children: {name -> node}} into {name, count, children: [sorted array]}
//
function flattenTree(node, displayName) {
    var children = [];
    for (var childName in node.children) {
        children.push(flattenTree(node.children[childName], childName));
    }
    children.sort(function(a, b) { return b.count - a.count; });
    return {name: displayName || node.name, count: node.count, children: children};
}

function buildSamplerFlame(data) {
    var ingested = ingestSamples(data);

    if (samplerCumulative) {
        mergeIntoAccum(ingested);
        samplerAccumTotal += ingested.count;
        samplerFlameData = coopMapToFlameData(samplerAccum, samplerAccumTotal, ingested.stacks);
    } else {
        samplerFlameData = coopMapToFlameData(ingested.coopMap, ingested.count, ingested.stacks);
    }

    var ctxCount = samplerFlameData.stacks
        ? samplerFlameData.roots.length
        : samplerFlameData.contexts.length;
    document.getElementById('si-samples').textContent = samplerFlameData.total;
    document.getElementById('si-contexts').textContent = ctxCount;
    document.getElementById('si-symbols').textContent = Object.keys(samplerSymbolCache).length;
}

function shortenSymbol(sym) {
    // Strip template parameters and function arguments for display
    // Keep the first template level but strip nested ones
    //
    if (sym === '???') return sym;
    // Strip everything after first '(' for C++ mangled names
    //
    var parenIdx = sym.indexOf('(');
    if (parenIdx > 0) sym = sym.substring(0, parenIdx);
    // Strip long template args: keep first <...> but truncate deeply nested ones
    //
    var depth = 0;
    var result = '';
    for (var i = 0; i < sym.length; i++) {
        if (sym[i] === '<') {
            depth++;
            if (depth > 1) continue;
        } else if (sym[i] === '>') {
            depth--;
            if (depth > 0) continue;
        } else if (depth > 1) {
            continue;
        }
        result += sym[i];
    }
    return result;
}

function drawSamplerFlame() {
    var canvas = document.getElementById('sampler-canvas');
    var emptyDiv = document.getElementById('sampler-empty');

    if (!samplerFlameData || samplerFlameData.total === 0) {
        canvas.style.display = 'none';
        emptyDiv.style.display = 'block';
        return;
    }

    canvas.style.display = 'block';
    emptyDiv.style.display = 'none';

    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.getBoundingClientRect();
    var W = rect.width;

    samplerRects = [];
    var total = samplerFlameData.total;

    if (samplerFlameData.stacks) {
        // Tree mode: recursively lay out flame graph from roots
        //
        var maxDepth = 0;
        var x = 0;
        for (var ri = 0; ri < samplerFlameData.roots.length; ri++) {
            var root = samplerFlameData.roots[ri];
            var rootW = (root.count / total) * W;
            if (rootW < 2) rootW = 2;
            var d = layoutFlameNode(root, 0, x, rootW, total, W, root.name);
            if (d > maxDepth) maxDepth = d;
            x += rootW;
        }
    } else {
        // Flat mode: top row = contexts, second row = functions
        //
        var x = 0;
        for (var ci = 0; ci < samplerFlameData.contexts.length; ci++) {
            var ctx = samplerFlameData.contexts[ci];
            var ctxW = (ctx.samples / total) * W;
            if (ctxW < 2) ctxW = 2;

            samplerRects.push({
                x: x, w: ctxW, depth: 0,
                name: ctx.name, count: ctx.samples,
                pct: (ctx.samples / total * 100).toFixed(1),
                isContext: true
            });

            var fx = x;
            for (var fi = 0; fi < ctx.functions.length; fi++) {
                var fn = ctx.functions[fi];
                var fnW = (fn.count / total) * W;
                if (fnW < 1) fnW = 1;
                samplerRects.push({
                    x: fx, w: fnW, depth: 1,
                    name: fn.name, count: fn.count,
                    pct: (fn.count / total * 100).toFixed(1),
                    contextName: ctx.name,
                    isContext: false
                });
                fx += fnW;
            }
            x += ctxW;
        }
        var maxDepth = 1;
    }

    var actualMaxDepth = 0;
    for (var i = 0; i < samplerRects.length; i++) {
        if (samplerRects[i].depth > actualMaxDepth) actualMaxDepth = samplerRects[i].depth;
    }

    var H = (actualMaxDepth + 1) * (SAMPLER_BAR_H + 1) + 8;
    canvas.height = H * dpr;
    canvas.style.height = H + 'px';
    canvas.width = W * dpr;

    var c = canvas.getContext('2d');
    c.scale(dpr, dpr);
    c.clearRect(0, 0, W, H);

    var ctxColors = [
        '#7fdbca', '#c792ea', '#f78c6c', '#82aaff', '#c3e88d',
        '#ff5370', '#e6db74', '#89ddff', '#f07178', '#ffcb6b'
    ];
    var ctxColorMap = {};
    var ctxColorIdx = 0;

    for (var i = 0; i < samplerRects.length; i++) {
        var r = samplerRects[i];
        var y = r.depth * (SAMPLER_BAR_H + 1) + 1;

        var color;
        if (r.isContext) {
            color = ctxColors[ctxColorIdx % ctxColors.length];
            ctxColorMap[r.name] = color;
            ctxColorIdx++;
        } else {
            // Deeper frames get progressively dimmer
            //
            var base = ctxColorMap[r.contextName] || '#888';
            var alpha = Math.max(0.4, 1.0 - r.depth * 0.08);
            color = base + Math.round(alpha * 255).toString(16).padStart(2, '0');
        }

        c.fillStyle = color;
        c.fillRect(r.x, y, Math.max(r.w - 1, 1), SAMPLER_BAR_H);

        if (r.w > 50) {
            c.fillStyle = '#000';
            c.font = '11px Consolas, Monaco, monospace';
            c.textBaseline = 'middle';
            var label = r.name + ' (' + r.pct + '%)';
            var maxTextW = r.w - 6;
            if (c.measureText(label).width > maxTextW) {
                label = r.name;
                while (label.length > 1 && c.measureText(label + '…').width > maxTextW) {
                    label = label.slice(0, -1);
                }
                label += '…';
            }
            c.fillText(label, r.x + 3, y + SAMPLER_BAR_H / 2);
        }
    }
}

// Recursively lay out a flame graph tree node. Returns max depth reached.
//
function layoutFlameNode(node, depth, x, w, total, canvasW, contextName) {
    samplerRects.push({
        x: x, w: w, depth: depth,
        name: node.name, count: node.count,
        pct: (node.count / total * 100).toFixed(1),
        isContext: depth === 0,
        contextName: contextName
    });

    var maxDepth = depth;
    var cx = x;
    for (var i = 0; i < node.children.length; i++) {
        var child = node.children[i];
        var childW = (child.count / total) * canvasW;
        if (childW < 1) childW = 1;
        var d = layoutFlameNode(child, depth + 1, cx, childW, total, canvasW, contextName);
        if (d > maxDepth) maxDepth = d;
        cx += childW;
    }
    return maxDepth;
}

// Sampler canvas mouse handlers
//
(function() {
    var canvas = document.getElementById('sampler-canvas');
    var tooltip = document.getElementById('sampler-tooltip');

    canvas.addEventListener('mousemove', function(e) {
        var rect = canvas.getBoundingClientRect();
        var mx = e.clientX - rect.left;
        var my = e.clientY - rect.top;

        var hit = null;
        for (var i = samplerRects.length - 1; i >= 0; i--) {
            var r = samplerRects[i];
            var y = r.depth * (SAMPLER_BAR_H + 1) + 1;
            if (mx >= r.x && mx <= r.x + r.w && my >= y && my <= y + SAMPLER_BAR_H) {
                hit = r; break;
            }
        }

        if (hit) {
            tooltip.innerHTML =
                '<div><span class="st-name">' + hit.name + '</span></div>' +
                '<div class="st-detail">' + hit.count + ' samples (' + hit.pct + '%)</div>';
            tooltip.style.display = 'block';
            var tx = e.clientX - canvas.parentElement.getBoundingClientRect().left + 12;
            var ty = e.clientY - canvas.parentElement.getBoundingClientRect().top + 12;
            if (tx + tooltip.offsetWidth > canvas.parentElement.offsetWidth - 8) {
                tx = tx - tooltip.offsetWidth - 24;
            }
            tooltip.style.left = tx + 'px';
            tooltip.style.top = ty + 'px';
        } else {
            tooltip.style.display = 'none';
        }
    });

    canvas.addEventListener('mouseleave', function() {
        tooltip.style.display = 'none';
    });
})();

// ---- Main refresh loop ----
function refresh() {
    Promise.all([
        fetch('/api/cooperators').then(function(r) { return r.json(); }),
        fetch('/api/cooperators/perf').then(function(r) { return r.json(); }),
    ]).then(function(results) {
        refreshStatus(results[0]);
        refreshFlame(results[0]);
        refreshPerf(results[1]);
        document.getElementById('updated').textContent =
            'updated ' + new Date().toLocaleTimeString();
    }).catch(function(e) {
        document.getElementById('updated').textContent =
            'error: ' + e.message;
    });
}

initPerfGroups();
refresh();
setInterval(refresh, POLL_MS);
window.addEventListener('resize', function() {
    drawStackedChart('chart', 'legend', statusHistory, statusColorFor);
    drawPerfChart();
    drawFlame();
    drawSamplerFlame();
});
</script>
